<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | MSD Antsirabe</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo"><h1>MSD</h1><p>Mitia sy Manompo an'i Kristy</p></div>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">Qui sommes-nous</a></li>
                    <li><a href="activites.html">Activités</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-fullscreen">
            <div class="hero-content" style="grid-template-columns:1fr; text-align:center;">
                <div class="hero-text">
                    <h2>On garde le contact ?</h2>
                    <p>Une question ? Une envie de rejoindre l'aventure ? Écrivez-nous.</p>
                </div>
            </div>
        </section>

        <div class="main-glass-container" style="max-width:700px;">
            <form style="display:flex; flex-direction:column; gap:20px;">
                <input type="text" placeholder="Votre Nom" style="padding:15px; border-radius:10px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white;">
                <input type="email" placeholder="Votre Email" style="padding:15px; border-radius:10px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white;">
                <textarea placeholder="Votre message" rows="5" style="padding:15px; border-radius:10px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white;"></textarea>
                <button type="submit" class="btn-glass" style="cursor:pointer;">Envoyer le message</button>
            </form>
        </div>
    </main>
</body>
</html>
