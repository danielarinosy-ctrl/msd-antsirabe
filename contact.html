<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | MSD Antsirabe</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo"><h1>MSD</h1><p>Mitia sy Manompo an'i Kristy</p></div>
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">Qui sommes-nous</a></li>
                    <li><a href="activites.html">Activités</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-fullscreen" style="height: 40vh; min-height: 300px;">
            <div class="hero-content" style="grid-template-columns: 1fr; text-align: center;">
                <div class="hero-text">
                    <span style="letter-spacing:3px; text-transform:uppercase; font-weight:700; opacity:0.8;">Nous Joindre</span>
                    <h2>Restons en Contact</h2>
                </div>
            </div>
        </section>

        <div class="main-glass-container" style="max-width: 1100px; margin-top: -50px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; align-items: start;">
                
                <div class="contact-info">
                    <h2 style="margin-bottom: 25px; font-size: 2rem;">Nos Coordonnées</h2>
                    
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <a href="https://wa.me/261348741396" target="_blank" 
                           style="display: flex; align-items: center; gap: 15px; color: white; text-decoration: none; background: rgba(37, 211, 102, 0.2); padding: 20px; border-radius: 20px; border: 1px solid rgba(37, 211, 102, 0.4); transition: 0.3s; transform: scale(1);">
                            <i class="fab fa-whatsapp" style="font-size: 2.5rem; color: #25D366;"></i>
                            <div>
                                <strong style="display: block; font-size: 1.1rem;">Discuter sur WhatsApp</strong>
                                <span style="opacity: 0.9;">034 87 413 96</span>
                            </div>
                        </a>

                        <div style="display: flex; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border);">
                            <i class="fas fa-map-marker-alt" style="font-size: 1.5rem; color: #ff4757;"></i>
                            <div>
                                <strong style="display: block;">Antsirabe</strong>
                                <span style="opacity: 0.8;">Vakinankaratra, Madagascar</span>
                            </div>
                        </div>

                        <div style="display: flex; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border);">
                            <i class="fas fa-envelope" style="font-size: 1.5rem; color: #3498db;"></i>
                            <div>
                                <strong style="display: block;">Email</strong>
                                <span style="opacity: 0.8;">danielarinosy@gmail.com</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-form-side">
                    <h2 style="margin-bottom: 25px; font-size: 2rem;">Envoyez un message</h2>
                    <form id="contactForm" style="display:flex; flex-direction:column; gap:15px;">
                        <input type="text" id="nom" placeholder="Votre Nom complet" required 
                               style="padding:15px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white; outline:none;">
                        
                        <input type="email" id="email" placeholder="Votre Email" required 
                               style="padding:15px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white; outline:none;">
                        
                        <textarea id="message" placeholder="Comment pouvons-nous vous aider ?" rows="5" required 
                                  style="padding:15px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.1); color:white; outline:none; resize:none;"></textarea>
                        
                        <button type="submit" class="btn-glass" style="width:100%; cursor:pointer; padding: 15px;">Envoyer via SMTP</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            // On change le texte du bouton pendant l'envoi
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            try {
                // IMPORTANT : Remplace localhost par ton URL Render plus tard
                const response = await fetch('http://localhost:3000/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(response.ok) {
                    alert("✅ Message envoyé avec succès !");
                    document.getElementById('contactForm').reset();
                } else {
                    alert("❌ Erreur lors de l'envoi.");
                }
            } catch (error) {
                console.error("Erreur:", error);
                alert("Impossible de joindre le serveur SMTP. Vérifie qu'il est lancé !");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
